name: Prize Distribution Cron

# Fires the payout endpoint every 5 minutes. Use this as a free alternative
# to Vercel Pro crons (the Hobby plan throttles crons to once per day).
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   CRON_URL    = https://www.chickengame.wtf/api/cron/distribute
#   CRON_SECRET = the same value set in your Vercel CRON_SECRET env var

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # allow manual trigger from the Actions tab

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger payout
        run: |
          curl -fsS -X GET "${{ secrets.CRON_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
